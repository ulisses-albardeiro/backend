display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
date.timezone = America/Sao_Paulo

; Padrão do PHP (upload_max_filesize=2M) é pequeno demais pra fotos reais de
; celular/câmera anexadas em itens de orçamento/OS. post_max_size cobre a soma
; de todos os arquivos + campos de um mesmo request multipart (várias fotos).
upload_max_filesize = 10M
post_max_size = 40M
